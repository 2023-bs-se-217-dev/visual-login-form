<style type="text/css">
      /* Reset basic margins */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Header styling */
    header {
      display: flex;
      background-color: #f4f4f4;        /* light grey background */
      display: flex;                    /* items in a row */
      justify-content: space-between;   /* logo left, nav right */
      align-items: center;              /* vertically centered */
      padding: 30px 50px;               /* spacing */
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); /* soft shadow */
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    /* Logo style */
    .logo {
      font-size: 25px;
      font-weight: bold;
      font-family: 'Dancing Script', cursive;
      color: #333;
    }

    /* Navigation menu style */
    nav a {
      text-decoration: underline;
      color: #333;
      margin: 0 15px;
      font-size: 18px;
      transition: color 0.3s;
    }

    /* Hover effect */
    nav a:hover {
      color: sandybrown; /* blue on hover */
      text-decoration: underline;
    }

    h1 {
      text-align: center;
      margin-top: 40px;
      margin-bottom: 10px;
      font-family: 'Playfair Display', serif;
    }

    hr {
      width: 100%;
      margin: 0 auto 40px;
      border: 1px solid #ccc;
    }

    /* Blog grid */
    .blog-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      padding-bottom: 80px;
    }

    .blog-row {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .blog-item {
      width: 30%;
      text-align: center;
      font-family: 'Playfair Display', serif;
      color: #333;
    }
    /* Hover effect */
.blog-item img:hover {
  opacity: 0.7;              /* transparency */
  filter: grayscale(30%);    /* soft gray tone */
  transform: scale(1.02);    /* slightly zoom in */
  cursor: pointer;
}


    .blog-item img {
      width: 100%;
      height: 400px;
      object-fit: cover;
      border-radius: 5px;
      transition: all 0.4s ease; /* smooth transition */
    }

    .blog-item p {
      margin-top: 10px;
      font-size: 20px;
      color: black;
      text-decoration: underline;
      font-family: 'Dancing Script', cursive;
    }

    /* Follow Section */
    .follow-section {
      background-color: #e7d2c2;
      padding: 25px 0 0 0;
      text-align: center;
      position: relative;
    }

    .follow-text {
      display: inline-block;
      border-bottom: 2px solid #333;
      padding-bottom: 10px;
    }

    .follow-text .script {
      font-family: 'Dancing Script', cursive;
      font-size: 45px;
      color: #333;
      margin-right: 8px;
    }

    .follow-text .normal {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: #333;
      font-weight: bold;
    }

    .insta-gallery {
      display: flex;
      width: 100%;
      background-color: #e7d2c2;
    }

    .insta-gallery img {
      width: 16.66%;
      height: 280px;
      object-fit: cover;
      margin: 0;
      padding: 0;
      border: none;
    }

    /* Footer */
    .site-footer {
      background-color: #e7d2c2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 35px 8%;
      color: #333;
      flex-wrap: wrap;
      border-top: none;
    }

    .footer-left a {
      color: black;
      font-size: 23px;
      margin-right: 15px;
      transition: opacity 0.3s;
    }

    .footer-left a:hover {
      opacity: 0.7;
    }

    .footer-center {
      text-align: center;
    }

    .footer-center h3 {
      font-family: 'Playfair Display', serif;
      font-size: 23px;
      margin-bottom: 5px;
    }

    .footer-center p {
      font-size: 14px;
      color: #555;
    }

    .footer-right a {
      color: #333;
      text-decoration: none;
      margin-left: 20px;
      font-weight: 500;
      transition: color 0.3s;
    }

    .footer-right a:hover {
      color: #b5838d;
    }

</style>
