<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Header styling */
header {
  display: flex;
  background-color: #f4f4f4;
  justify-content: space-between;
  align-items: center;
  padding: 20px 50px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  position: sticky;
  top: 0;
  z-index: 1000;
}

/* Logo style */
.logo {
  font-size: 28px;
  font-weight: bold;
  font-family: 'Dancing Script', cursive;
  color: #333;
}

/* Navigation */
nav a {
  text-decoration: underline;
  color: #333;
  margin: 0 15px;
  font-size: 18px;
  transition: color 0.3s;
}

nav a:hover {
  color: sandybrown;
}

/* Page title */
h1 {
  text-align: center;
  font-size: 40px;
  color: black;
  font-family: inherit;
  margin-top: 60px;
}

/* Image and caption */
.image-container {
  text-align: center;
  margin-top: 60px;
}

.image-container img {
  width: 50%;
  height: 80%;
  object-fit: cover;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.caption {
  margin-top: 20px;
  font-size: 44px;
  color: #333;
  font-family: 'Playfair Display', serif;
  text-align: center;
  letter-spacing: 1px;
  font-weight: 600;
}

.caption em {
  font-style: italic;
}

/* Booking text and email */
.contact-text {
  text-align: center;
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: #444;
  margin-top: 15px;
}

.contact-text a {
  color: black;
  font-weight: bold;
  text-decoration: none;
}

.contact-text a:hover {
  text-decoration: underline;
}

/* Say hi text */
.sayhi {
  text-align: center;
  font-family: 'Dancing Script', cursive;
  font-size: 36px;
  margin-top: 60px;   /* increased space above */
  margin-bottom: 40px; /* increased space below */
  color: #333;
}

/* Contact form */
form {
  width: 40%;
  margin: 30px auto;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

input, textarea {
  padding: 10px;
  border: 1px solid #ccc;
  font-size: 16px;
  font-family: 'Playfair Display', serif;
  outline: none;
  transition: 0.3s;
}

input:focus, textarea:focus {
  border-color: black;
}

textarea {
  resize: vertical;
  height: 100px;
}

/* Button */
button {
  background-color: black;
  color: white;
  border: none;
  padding: 12px;
  font-size: 16px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: background 0.3s;
}

button:hover {
  background-color: #333;
}

/* Follow Section */
.follow-section {
  background-color: #e7d2c2; /* same as footer */
  padding: 25px 0 0 0;
  text-align: center;
  position: relative;
}

.follow-text {
  display: inline-block;
  border-bottom: 2px solid #333;
  padding-bottom: 10px;
}

.follow-text .script {
  font-family: 'Dancing Script', cursive;
  font-size: 45px;
  color: #333;
  margin-right: 8px;
}

.follow-text .normal {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  color: #333;
  font-weight: bold;
}

.insta-gallery {
  display: flex;
  width: 100%;
  background-color: #e7d2c2; /* dusty pink */

}

.insta-gallery img {
  width: 16.66%;
  height: 280px;
  object-fit: cover;
  margin: 0;
  padding: 0;
  border: none;
}

/* Footer Styling (updated)      */
.site-footer {
  background-color: #e7d2c2; /* slightly darker beige than highlights */
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 35px 8%;
  color: #333;
  flex-wrap: wrap;
  border-top: none;
}

/* Left: icons */
.footer-left a {
  color: black; /* black icons */
  font-size: 23px;
  margin-right: 15px;
  transition: opacity 0.3s;
}
.footer-left a:hover {
  opacity: 0.7; /* slight fade hover */
}

/* Center text */
.footer-center {
  text-align: center;
}
.footer-center h3 {
  font-family: 'Poppins', sans-serif;
  font-size: 23px;
  margin-bottom: 5px;
}
.footer-center p {
  font-size: 14px;
  color: #555;
}

/* Right links */
.footer-right a {
  color: #333;
  text-decoration: none;
  margin-left: 20px;
  font-weight: 500;
  transition: color 0.3s;
}
.footer-right a:hover {
  color: #b5838d; /* soft pink hover */
}

/* Responsive footer */
@media (max-width: 768px) {
  .site-footer {
    flex-direction: column;
    text-align: center;
  }
  .footer-left, .footer-right {
    margin-top: 10px;
  }

</style>
</head>
